# Configuração de rede — Server-1
# Arquivo: /etc/netplan/00-installer-config.yaml
# Para o Server-2, alterar o endereço para 192.168.10.2/24

network:
  version: 2
  renderer: networkd
  ethernets:
    eno1:
      dhcp4: false
      dhcp6: false
      addresses:
        - 192.168.10.1/24        # Alterar para 192.168.10.2/24 no server-2
      routes:
        - to: default
          via: 192.168.10.254
      nameservers:
        addresses: [8.8.8.8, 8.8.4.4]