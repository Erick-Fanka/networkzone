! Configurar hostname e senha de acesso.
enable
configure terminal
hostname Switch-2
enable secret admin123

! Configurar VLANs
vlan 30
    name FINANCEIRO
    exit

vlan 40
    name SUPORTE
    exit

vlan 99
    name MANAGEMENT
    exit

! Configurar Portas para os hosts.
interface range f0/1 - 7
    switchport mode access
    switchport access vlan 30
    no shutdown
    exit
    interface range f0/8 - 15
    switchport mode access
    switchport access vlan 40
    no shutdown
    exit

! Configurar porta uplink para o Switchcore-L3
interface f0/24
    switchport mode trunk
    switchport mode trunk
    switchport trunk allowed vlan 30,40,99
    no shutdown
    exit
    exit
! Salvar configuração
write memory