! Configurar hostname e senha de acesso.
enable
configure terminal
hostname Switch-2
enable secret admin123

! Configurar VLANs
vlan 50
    name VISITANTES
    exit

vlan 99
    name MANAGEMENT
    exit

! Configurar Portas para os hosts.
interface range f0/1 - 7
    switchport mode access
    switchport access vlan 50
    no shutdown
    exit

! Configurar porta uplink para o Switchcore-L3
interface f0/24
    switchport mode trunk
    switchport trunk native vlan 99
    switchport trunk allowed vlan 50,99
    no shutdown
    exit
    exit
! Salvar configuração
write memory