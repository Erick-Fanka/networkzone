! Nomear switch, configurar senha de acesso e habilitar roteamento.
enable
configure terminal 
hostname Switchcore-L3
enable secret admin123
ip routing

! Configurar VLANs
vlan 10
    name DIRETORIA
    exit
vlan 20
    name TI
    exit
vlan 30
    name FINANCEIRO
    exit
vlan 40
    name SUPORTE
    exit
vlan 50
    name VISITANTES
    exit
vlan 60
    name SERVIDORES
    exit
vlan 99
    name MANAGEMENT
    exit

! Configurar Gateways svi.
interface vlan 10
    ip address 192.168.10.1 255.255.255.0
    no shutdown
    exit
interface vlan 20
    ip address 192.168.20.1 255.255.255.0
    no shutdown
    exit
interface vlan 30
    ip address 192.168.30.1 255.255.255.0
    no shutdown
    exit
interface vlan 40
    ip address 192.168.40.1 255.255.255.0
    no shutdown
    exit
interface vlan 50
    ip address 192.168.50.1 255.255.255.0
    no shutdown
    exit
interface vlan 60
    ip address 192.168.60.1 255.255.255.0
    no shutdown
    exit
interface vlan 99
    ip address 192.168.99.1 255.255.255.0
    no shutdown
    exit
! Link para R1
interface g0/1
    no switchport
    ip address 10.0.0.2 255.255.255.252
    no shutdown
    exit
! Ativar OSPF
router ospf 1
    network 192.168.0.0 0.0.255.255 area 0
    network 10.0.0.0 0.0.0.3 area 0
    exit

! Configurar DHCP para as VLANs
interface vlan 10
    ip helper-address 192.168.60.10
interface vlan 20
    ip helper-address 192.168.60.10
interface vlan 30
    ip helper-address 192.168.60.10
interface vlan 40
    ip helper-address 192.168.60.10
interface vlan 50
    ip helper-address 192.168.60.10

! Configurar modo Trunk nas portas dos Switches de acesso.
interface range f0/1 - 3
     switchport trunk encapsulation dot1q   
    switchport mode trunk                  
    switchport trunk allowed vlan 10,20,30,40,50,60,99
    switchport trunk native vlan 99
    no shutdown
    exit

! Configurar modo Access para os servidores
interface range f0/4 - 6
    switchport mode access
    switchport access vlan 60
    no shutdown
    exit

! Criação de ACL Estendida
ip access-list extended BLOQUEIO_VISITANTES

! PERMITIR acesso dos visitantes aos servidores essencias.
    permit ip 192.168.50.0 0.0.0.255 host 192.168.60.10
    permit ip 192.168.50.0 0.0.0.255 host 192.168.60.20
    permit ip 192.168.50.0 0.0.0.255 host 192.168.60.30

!BLOQUEAR acesso a qualquer outra rede interna
    deny ip 192.168.50.0 0.0.0.255 192.168.0.0 0.0.255.255

!Permitir acesso dos visitantes à Internet
    permit ip any any
    exit

! Aplicar ACL na interface de acesso dos visitantes
interface vlan 50
    ip access-group BLOQUEIO_VISITANTES in
    exit
        
! Salvar configuração
write memory
