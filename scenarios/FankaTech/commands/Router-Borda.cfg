! Configurar hostname e senha de acesso.
enable
configure terminal
hostname Router-Borda
enable secret admin123

! Configurar interface para Router interno.
interface g0/0
    ip address 20.0.0.1 255.255.255.252
    no shutdown
    exit

! Configurar interface para Internet
interface g0/1
    ip address 200.0.0.1 255.255.255.0
    no shutdown
    exit

! Configurar OSPF
router ospf 1
    network 20.0.0.0 0.0.0.3 area 0
    exit

! Configurar NAT para acesso à Internet
access-list 1 permit 192.168.0.0 0.0.255.255
interface g0/1
    ip nat outside
    exit
interface g0/0
    ip nat inside
    exit
ip nat inside source list 1 interface g0/1 overload

! Configurar rota padrão para Internet
ip route 0.0.0.0 0.0.0.0 g0/1

! Configurar OSPF para anunciar rota padrão para o Router Interno
router ospf 1
default-information originate
exit
exit
write memory

! Salvar configuração
write memory
