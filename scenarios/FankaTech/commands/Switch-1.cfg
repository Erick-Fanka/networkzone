! Configurar hostname e senha de acesso.
enable
configure terminal
hostname Switch-1
enable secret admin123
! Configurar VLANs
vlan 10
    name DIRETORIA
    exit

vlan 20
    name TI
    exit

vlan 99
    name MANAGEMENT
    exit

! Configurar Portas para os hosts.
interface range f0/1 - 7
    switchport mode access
    switchport access vlan 10
    no shutdown
    exit
    interface range f0/8 - 15
    switchport mode access
    switchport access vlan 20
    no shutdown
    exit
! Configurar porta uplink para o Switchcore-L3
interface f0/24
    switchport mode trunk
    switchport trunk native vlan 99
    switchport trunk allowed vlan 10,20,99
    no shutdown
    exit
    exit
! Salvar configuração
write memory