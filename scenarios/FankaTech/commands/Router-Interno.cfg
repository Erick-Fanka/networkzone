! Configurar hostname e senha de acesso.
enable 
configure terminal
hostname Router-Interno
enable secret admin123

! Configurar interface para Switch Core.
interface g0/1
    ip address 10.0.0.1 255.255.255.252
    no shutdown
    exit

! Configurar iterface para R1
interface g0/0
    ip address 20.0.0.2 255.255.255.252
    no shutdown
    exit
router ospf 1
    network 10.0.0.0 0.0.0.3 area 0
    network 20.0.0.0 0.0.0.3 area 0
    exit
! Salvar configuração
write memory
